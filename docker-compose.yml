services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      APP_NAME: rag-saas-docs-ingestion-poc
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      QDRANT_URL: http://qdrant:6333
      KEYCLOAK_ISSUER: http://localhost:8080/realms/rag
      KEYCLOAK_INTERNAL_ISSUER: http://keycloak:8080/realms/rag
      KEYCLOAK_AUDIENCE: rag-api
      KEYCLOAK_CLIENT_ID: rag-frontend
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-536870912}
      ALLOWED_UPLOAD_EXTENSIONS: ${ALLOWED_UPLOAD_EXTENSIONS:-.pdf,.txt,.md,.csv,.tsv,.docx,.xlsx,.pptx,.png,.jpg,.jpeg,.tiff,.bmp}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-eng}
      OCR_PDF_DPI: ${OCR_PDF_DPI:-200}
      OCR_MAX_PDF_PAGES: ${OCR_MAX_PDF_PAGES:-20}
      ENABLE_DB_PERSISTENCE: "true"
      RETRIEVAL_MIN_SCORE: "0.12"
      RETRIEVAL_MIN_KEYWORD_OVERLAP: "0.20"
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LOCAL_LLM_RUNTIME: ${LOCAL_LLM_RUNTIME:-extractive}
      LOCAL_LLM_MODEL_NAME: ${LOCAL_LLM_MODEL_NAME:-extractive}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://ollama:11434}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      LOCAL_EMBEDDING_RUNTIME: ${LOCAL_EMBEDDING_RUNTIME:-hashing}
      LOCAL_EMBEDDING_MODEL_NAME: ${LOCAL_EMBEDDING_MODEL_NAME:-hashing-384}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      LOCAL_EMBEDDING_BASE_URL: ${LOCAL_EMBEDDING_BASE_URL:-http://ollama:11434}
      LOCAL_MODEL_REQUEST_TIMEOUT_SECONDS: ${LOCAL_MODEL_REQUEST_TIMEOUT_SECONDS:-30}
      PUBLIC_LLM_ENABLED: ${PUBLIC_LLM_ENABLED:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./data/ingest:/data/ingest:ro
      - ./data/uploads:/data/uploads
      - ${HOST_DOWNLOADS_DIR:-./data/host-downloads}:/host-downloads:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["python", "-m", "app.worker"]
    environment:
      APP_NAME: rag-saas-docs-ingestion-poc
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      QDRANT_URL: http://qdrant:6333
      KEYCLOAK_ISSUER: http://localhost:8080/realms/rag
      KEYCLOAK_INTERNAL_ISSUER: http://keycloak:8080/realms/rag
      KEYCLOAK_AUDIENCE: rag-api
      KEYCLOAK_CLIENT_ID: rag-frontend
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-536870912}
      ALLOWED_UPLOAD_EXTENSIONS: ${ALLOWED_UPLOAD_EXTENSIONS:-.pdf,.txt,.md,.csv,.tsv,.docx,.xlsx,.pptx,.png,.jpg,.jpeg,.tiff,.bmp}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-eng}
      OCR_PDF_DPI: ${OCR_PDF_DPI:-200}
      OCR_MAX_PDF_PAGES: ${OCR_MAX_PDF_PAGES:-20}
      ENABLE_DB_PERSISTENCE: "true"
      RETRIEVAL_MIN_SCORE: "0.12"
      RETRIEVAL_MIN_KEYWORD_OVERLAP: "0.20"
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LOCAL_LLM_RUNTIME: ${LOCAL_LLM_RUNTIME:-extractive}
      LOCAL_LLM_MODEL_NAME: ${LOCAL_LLM_MODEL_NAME:-extractive}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://ollama:11434}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      LOCAL_EMBEDDING_RUNTIME: ${LOCAL_EMBEDDING_RUNTIME:-hashing}
      LOCAL_EMBEDDING_MODEL_NAME: ${LOCAL_EMBEDDING_MODEL_NAME:-hashing-384}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      LOCAL_EMBEDDING_BASE_URL: ${LOCAL_EMBEDDING_BASE_URL:-http://ollama:11434}
      LOCAL_MODEL_REQUEST_TIMEOUT_SECONDS: ${LOCAL_MODEL_REQUEST_TIMEOUT_SECONDS:-30}
      PUBLIC_LLM_ENABLED: ${PUBLIC_LLM_ENABLED:-false}
    volumes:
      - ./data/ingest:/data/ingest:ro
      - ./data/uploads:/data/uploads
      - ${HOST_DOWNLOADS_DIR:-./data/host-downloads}:/host-downloads:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-models"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  keycloak_data:
  ollama_data:
