name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint backend
        run: python -m ruff check app tests

      - name: Run backend tests
        env:
          EMBEDDING_PROVIDER: local
          LOCAL_EMBEDDING_RUNTIME: hashing
          LOCAL_EMBEDDING_MODEL_NAME: hashing-384
          LLM_PROVIDER: local
          LOCAL_LLM_RUNTIME: extractive
          LOCAL_LLM_MODEL_NAME: extractive
          VECTOR_INDEX_BACKEND: memory
          RERANKER_PROVIDER: none
          PUBLIC_LLM_ENABLED: "false"
        run: python -m pytest

      - name: Run retrieval evaluation gate
        env:
          EMBEDDING_PROVIDER: local
          LOCAL_EMBEDDING_RUNTIME: hashing
          LOCAL_EMBEDDING_MODEL_NAME: hashing-384
          LLM_PROVIDER: local
          LOCAL_LLM_RUNTIME: extractive
          LOCAL_LLM_MODEL_NAME: extractive
          VECTOR_INDEX_BACKEND: memory
          RERANKER_PROVIDER: none
          PUBLIC_LLM_ENABLED: "false"
        run: python -m app.eval.run

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  compose:
    name: Compose validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          docker compose config
          docker compose -f docker-compose.yml -f infra/deploy/docker-compose.prod.example.yml config

      - name: Check whitespace
        run: git diff --check
